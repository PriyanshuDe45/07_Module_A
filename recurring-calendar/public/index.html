<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recurring Calendar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
  h1   { text-align: center; margin-bottom: 16px; }

  .container { display: flex; gap: 20px; max-width: 1100px; margin: auto; }

  /* ── LEFT PANEL ── */
  .left { width: 280px; flex-shrink: 0; }

  .card { background: #fff; border-radius: 8px; padding: 16px;
          box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 16px; }
  .card h3 { margin-bottom: 12px; font-size: 14px; color: #555; }

  label { display: block; font-size: 13px; margin-bottom: 4px; color: #444; }
  input, select { width: 100%; padding: 7px 9px; border: 1px solid #ccc;
                  border-radius: 5px; font-size: 13px; margin-bottom: 10px; }

  .row2 { display: flex; gap: 8px; }
  .row2 > div { flex: 1; }

  #recurFields { display: none; }

  button { width: 100%; padding: 9px; background: #4f6ef7; color: #fff;
           border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
  button:hover { background: #3a57d4; }

  /* ── CALENDAR ── */
  .right { flex: 1; }

  .cal-header { display: flex; align-items: center; justify-content: space-between;
                background: #fff; border-radius: 8px; padding: 12px 16px;
                box-shadow: 0 1px 4px rgba(0,0,0,.1); margin-bottom: 12px; }
  .cal-header button { width: auto; padding: 6px 14px; font-size: 13px; }
  .cal-header span { font-size: 16px; font-weight: bold; }

  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }

  .day-name { text-align: center; font-size: 12px; font-weight: bold;
              color: #777; padding: 4px 0; }

  .cell { background: #fff; border-radius: 6px; min-height: 80px; padding: 6px;
          box-shadow: 0 1px 3px rgba(0,0,0,.07); }
  .cell.other-month { background: #f8f8f8; opacity: .6; }
  .cell.today { border: 2px solid #4f6ef7; }

  .cell .num { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 4px; }

  .event { background: #4f6ef7; color: #fff; border-radius: 3px; font-size: 11px;
           padding: 2px 4px; margin-top: 2px; overflow: hidden;
           white-space: nowrap; text-overflow: ellipsis; }
</style>
</head>
<body>

<h1>Recurring Calendar</h1>

<div class="container">

  <!-- LEFT -->
  <div class="left">

    <!-- Date Selector -->
    <div class="card">
      <h3>Go to Month</h3>
      <label>Year</label>
      <input type="number" id="gotoYear">
      <label>Month</label>
      <select id="gotoMonth">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
      <button onclick="goToMonth()">Go</button>
    </div>

    <!-- Add Schedule -->
    <div class="card">
      <h3>Add Schedule</h3>

      <label>Title</label>
      <input type="text" id="fTitle" placeholder="Meeting...">

      <label>Task Date</label>
      <input type="date" id="fDate">

      <label>
        <input type="checkbox" id="fRecur" onchange="toggleRecur()"> Is Recurring
      </label>

      <div id="recurFields">
        <br>
        <div class="row2">
          <div>
            <label>Type</label>
            <select id="fType">
              <option>Day</option><option>Week</option>
              <option>Month</option><option>Year</option>
            </select>
          </div>
          <div>
            <label>Cycle</label>
            <input type="number" id="fCycle" value="1" min="1">
          </div>
        </div>
        <label>End Date</label>
        <input type="date" id="fEnd">
      </div>

      <button onclick="addSchedule()">Add</button>
    </div>

  </div>

  <!-- CALENDAR -->
  <div class="right">
    <div class="cal-header">
      <button onclick="changeMonth(-1)">◀ Prev</button>
      <span id="calTitle"></span>
      <button onclick="changeMonth(1)">Next ▶</button>
    </div>

    <div class="grid" id="dayNames"></div>
    <div class="grid" id="calGrid"></div>
  </div>

</div>

<script>
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let cur = new Date();
let year = cur.getFullYear();
let month = cur.getMonth();

// Init
document.getElementById('gotoYear').value = year;
document.getElementById('gotoMonth').value = month;
renderDayNames();
loadCalendar();

function renderDayNames() {
  const g = document.getElementById('dayNames');
  g.innerHTML = DAYS.map(d => `<div class="day-name">${d}</div>`).join('');
}

function toggleRecur() {
  document.getElementById('recurFields').style.display =
    document.getElementById('fRecur').checked ? 'block' : 'none';
}

function changeMonth(dir) {
  month += dir;
  if (month > 11) { month = 0; year++; }
  if (month <  0) { month = 11; year--; }
  loadCalendar();
}

function goToMonth() {
  year  = parseInt(document.getElementById('gotoYear').value);
  month = parseInt(document.getElementById('gotoMonth').value);
  loadCalendar();
}

async function loadCalendar() {
  document.getElementById('calTitle').textContent = `${MONTHS[month]} ${year}`;
  document.getElementById('gotoYear').value  = year;
  document.getElementById('gotoMonth').value = month;

  const res    = await fetch(`/api/schedules?year=${year}&month=${month}`);
  const events = await res.json();

  // Group events by day
  const map = {};
  for (const e of events) {
    if (!map[e.day]) map[e.day] = [];
    map[e.day].push(e.title);
  }

  // Build grid
  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const prevLast = new Date(year, month, 0).getDate();
  const today    = new Date();

  let cells = '';
  const total = 42;

  for (let i = 0; i < total; i++) {
    let day, cls = 'cell';
    if (i < firstDay) {
      day = prevLast - firstDay + 1 + i;
      cls += ' other-month';
    } else if (i >= firstDay + lastDate) {
      day = i - firstDay - lastDate + 1;
      cls += ' other-month';
    } else {
      day = i - firstDay + 1;
      const isToday = day === today.getDate() &&
                      month === today.getMonth() &&
                      year  === today.getFullYear();
      if (isToday) cls += ' today';
    }

    const evts = (!cls.includes('other-month') && map[day])
      ? map[day].map(t => `<div class="event">${t}</div>`).join('') : '';

    cells += `<div class="${cls}"><div class="num">${day}</div>${evts}</div>`;
  }

  document.getElementById('calGrid').innerHTML = cells;
}

async function addSchedule() {
  const title = document.getElementById('fTitle').value.trim();
  const date  = document.getElementById('fDate').value;
  if (!title || !date) return alert('Title and date are required.');

  const isRecurring = document.getElementById('fRecur').checked;
  const body = { title, taskDate: date, isRecurring };

  if (isRecurring) {
    const end = document.getElementById('fEnd').value;
    if (!end) return alert('End date required for recurring.');
    body.type  = document.getElementById('fType').value;
    body.cycle = parseInt(document.getElementById('fCycle').value);
    body.endDate = end;
  }

  await fetch('/api/schedules', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  // Reset form
  document.getElementById('fTitle').value = '';
  document.getElementById('fDate').value  = '';
  document.getElementById('fRecur').checked = false;
  document.getElementById('fEnd').value   = '';
  document.getElementById('fCycle').value = 1;
  toggleRecur();
  loadCalendar();
}
</script>
</body>
</html>
