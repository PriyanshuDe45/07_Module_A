<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Fractal Line</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    background: #d0d0d0;
    font-family: Arial, sans-serif;
  }
  canvas {
    background: #fff;
    display: block;
    flex-shrink: 0;
  }
  #controls {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px;
    gap: 6px;
  }
  input[type="number"] {
    width: 80px;
    font-size: 14px;
    padding: 2px 4px;
  }
  button {
    font-size: 14px;
    padding: 2px 10px;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="controls">
  <input type="number" id="n" value="2" min="1" />
  <button onclick="draw()">Draw</button>
</div>

<script>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');


const W = Math.floor(window.innerWidth * 0.76);
const H = window.innerHeight;
canvas.width  = W;
canvas.height = H;

function fractal(x, y, w, h, depth) {
  if (depth <= 1) return;

  const my = y + h / 2;
  const lx = x + w / 3;
  const rx = x + w * 2 / 3;


  ctx.beginPath();
  ctx.moveTo(x, my);
  ctx.lineTo(x + w, my);
  ctx.stroke();


  if (depth >= 3) {
    ctx.beginPath();
    ctx.moveTo(lx, y);
    ctx.lineTo(lx, y + h);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(rx, y);
    ctx.lineTo(rx, y + h);
    ctx.stroke();
  }

  const hw = w / 2;
  const hh = h / 2;
  fractal(x,      y,      hw, hh, depth - 1);
  fractal(x + hw, y,      hw, hh, depth - 1);
  fractal(x,      y + hh, hw, hh, depth - 1);
  fractal(x + hw, y + hh, hw, hh, depth - 1);
}

function draw() {
  const n = Math.max(1, parseInt(document.getElementById('n').value) || 1);
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  fractal(0, 0, W, H, n);
}

draw();
</script>
</body>
</html>
