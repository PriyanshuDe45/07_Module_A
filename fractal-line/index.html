<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Fractal Line</title>
</head>
<body>
    <canvas></canvas>
    <input type="number" name="depth-input" id="depth-input">
    <button id="drawBtn">Draw</button>

    <script>

        const canvas = document.querySelector('canvas');
        const depthInput = document.querySelector('#depth-input');
        const drawBtn = document.querySelector('#drawBtn');
        const ctx = canvas.getContext('2d');
        const w = 600;
        const h = 600;
        canvas.width = w;
        canvas.height = h;
        const sqrt2 = Math.sqrt(2);

        const drawFractalLine = (depth, x, y, l, flag) => {
            if (depth <= 0) return;
            ctx.strokeStyle = 'black'
            ctx.beginPath();
            const startX = flag === 'h' ? x - l/sqrt2 : x;
            const startY = flag === 'v' ? y - l/sqrt2 : y;
            const endX = flag === 'h' ? x + l/sqrt2 : x;
            const endY = flag === 'v' ? y + l/sqrt2 : y;
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.closePath();
            ctx.stroke()
            drawFractalLine(depth-1, startX, startY, l/sqrt2, flag === 'v' ? 'h' : 'v');
            drawFractalLine(depth-1, endX, endY, l/sqrt2, flag === 'v' ? 'h' : 'v');
        }

        drawBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, w, h);
            drawFractalLine(depthInput.value, w/2, h/2, w, 'h')
        })
        drawFractalLine(10, w/2, h/2, w/2, 'h')

    </script>
</body>
</html>
