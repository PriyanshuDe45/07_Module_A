<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Asynchronous calculation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .message-box {
            margin: 3rem 0;
        }
    </style>
</head>
<body>

<form onsubmit="runCalc(event)">
    <input type="number" id="numberInput">
    <button>Calculation</button>
</form>

<div class="message-box">
    <p>
        number: <b id="number"></b>
    </p>
    <p>
        progress: <b id="progress"></b>
    </p>
    <p>
        result: <b id="result"></b>
    </p>
</div>

<button onclick="changeRandomBackground()">change background</button>

<script>
    const $result = document.getElementById("result");
    const $progress = document.getElementById("progress");
    const $number = document.getElementById("number");
    const $input = document.getElementById("numberInput");

    let isCalculating = false;

    function changeRandomBackground() {
        const r = Math.floor(Math.random() * 255);
        const g = Math.floor(Math.random() * 255);
        const b = Math.floor(Math.random() * 255);
        document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
    }

    
    function sumNumber(n) {
        return new Promise((resolve) => {
            let result = 0;
            let current = 1;

            function calculateChunk() {
               
                const chunkSize = 100000;

                const end = Math.min(current + chunkSize - 1, n);

                for (let i = current; i <= end; i++) {
                    result += i;
                }

                current = end + 1;

               
                const percent = ((end / n) * 100).toFixed(0);
                $progress.textContent = `${percent}%`;

                if (current <= n) {
                   
                    setTimeout(calculateChunk, 0);
                } else {
                    resolve(result);
                }
            }

            calculateChunk();
        });
    }

    async function runCalc(e) {
        e.preventDefault();

        if (isCalculating) {
            alert("Already calculating");
            return;
        }

        const n = Number($input.value);

        if (!n || n < 1) return;

        isCalculating = true;

        $number.textContent = n;
        $progress.textContent = "0%";
        $result.textContent = "";

        const result = await sumNumber(n);

        $result.textContent = result;
        $progress.textContent = "100%";

        isCalculating = false;
    }

</script>

</body>
</html>
